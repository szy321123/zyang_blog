cloudflare_analytics:
# Cloudflare 分析令牌

# 参考链接：https://clarity.microsoft.com/
microsoft_clarity:
# 微软清晰度 ID

# 参考链接：https://umami.is/
umami_analytics:
  # Umami 统计配置（支持自托管与云服务）
  enable: false
  # 对于自托管设置，配置 Umami 实例的主机名
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud（API 密钥）/自托管 Umami（令牌）
    token:

# 参考链接：https://www.googletagmanager.com/
