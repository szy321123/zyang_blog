# 广告
# --------------------------------------

# 谷歌广告联盟
google_adsense:
  # Google AdSense 广告配置
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
# 如果不需要广告则留空
ad:
  # 在索引中插入广告（每三个帖子）
  index:
  # 在旁边插入广告
# 新手建议：侧边栏卡片设置，控制显示哪些模块
# 核心配置：aside
# 新手建议：侧边栏卡片设置，控制显示哪些模块
  aside:
  # 在帖子中插入广告（分页之前）
# 新手建议：文章页相关配置
# 新手建议：文章页相关配置
  post:

# --------------------------------------
# 确认
# --------------------------------------

site_verification:
  # - 名称：谷歌站点验证
  # 内容：xxxxxx
  # - 名称：百度站点验证
  # 内容：xxxxxx

# --------------------------------------
# 美化/效果
# --------------------------------------

# 主题颜色可自定义
# 注意：颜色值必须用双引号引起来，如“#000”，否则可能会导致错误！

# 主题颜色：
# 启用：真
# 主要：“#49B1F5”
# 分页器：“#00c4b6”
# 按钮悬停：“#FF7242”
# 文本选择：“#00c4b6”
# 链接颜色：“#99a9bf”
# 元颜色：“#858585”
# 示例配置：hr_color: "#A4D8FA"
# 代码前景：“#F47466”
# 示例配置：code_background: "rgba(27, 31, 35, .05)"
# 目录颜色：“#00c4b6”
# 说明：blockquote_padding_color：“#49b1f5”
# 说明：blockquote_background_color：“#49b1f5”
# 滚动条颜色：“#49b1f5”
# 说明：meta_theme_color_light：“ffffff”
# 示例配置：meta_theme_color_dark: "#0d0d0d"

# 类别和标签页的用户界面设置
# 选择：索引 - 与主页 UI 相同 / 默认 - 与档案 UI 相同
# 将其留空或索引
category_ui:
tag_ui:

# UI 元素的圆角
rounded_corners_ui: true

# 拉伸线条，使每条线的宽度相等
text_align_justify: false

# 向页眉和页脚添加蒙版
mask:
  header: true
  footer: false

# 加载动画
preloader:
  enable: true
  # 来源
  # 1.整页加载
  # 2. 进度（进度条）
  source: 1
  # 说明：pace theme (see https://codebyzach.github.io/pace/)
  pace_css_url:

# 页面转换
enter_transitions: true

# 默认显示模式 - 亮（默认）/暗
display_mode: light

# 美化文章内容的配置
beautify:
  enable: true
  # 指定要美化的字段（站点或帖子）
  field: post
  # 指定用作标题前缀的图标，例如“\f0c1”
  title_prefix_icon: '\f0c1'
  # 指定标题前缀图标的颜色，例如“#F47466”
  title_prefix_icon_color: '#F47466'

# 全局字体设置
# 除非您知道以下设置如何工作，否则请勿修改它们
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和网站副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分隔线图标的设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  icon_top:

# 打字机效果
# 参考链接：https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: true
  colorful: false
  shake: false
  mobile: false

# 背景效果
# --------------------------------------

# 画布丝带
# 参考：https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 丝带尺寸
  size: 150
  # 色带不透明度 (0 ~ 1)
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 飘动的丝带
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# 画布_巢
# 参考链接：https://github.com/hustcc/canvas-nest.js
canvas_nest:
   enable: false
   color: '205,190,214'
   opacity: 0.32
   zIndex: -1
   count: 58
   mobile: false

# 鼠标点击效果：烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击效果：心形符号
click_heart:
  enable: true
  mobile: false

# 鼠标点击效果：文字
clickShowText:
  enable: true
  text:
    - 继续前进
    - 灵感+1
    - 今天也有收获
    - 写下思考
    - 保持热爱
    - 打磨细节
    - 代码会说话
    - 把复杂讲清楚
    - 慢一点也没关系
    - 再试一次
    - 你正在变强
    - 记录每一步
    - 认真生活
    - 认真输出
    - 向上生长
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 灯箱设置
# --------------------------------------

# 选择：fancybox /medium_zoom
# 参考链接：https://github.com/francoischalifour/medium-zoom
# 参考链接：https://fancyapps.com/fancybox/
# 如果不需要灯箱，请将其留空
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列
series:
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序。 1、asc为上升； -1, desc 为降序
  order: 1
  number: true

# ABCJS - ABC 乐谱插件
# 参考链接：https://github.com/paulrosen/abcjs
abcjs:
  # ABC 乐谱渲染插件配置
  enable: false
  per_page: true

# 美人鱼
# 参考链接：https://github.com/mermaid-js/mermaid
mermaid:
  # Mermaid 流程图/时序图渲染配置
  enable: true
  # 使用代码块编写美人鱼图
  code_write: true
  # 内置主题：默认/森林/深色/中性
  theme:
    light: default
    dark: dark
  # 启用“在新选项卡中打开”按钮以在单独的窗口中查看图表
  open_in_new_tab: true
  # 在图表上启用缩放和平移交互
  zoom_pan: true

# 图表
# 参考：https://www.chartjs.org/docs/latest/
chartjs:
  # Chart.js 图表插件配置
  enable: true
  # 除非您了解它们的工作原理，否则请勿修改。
  # 仅当未指定 MD 语法时才使用默认设置。
  # 图表的通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极地图上刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# 注意 - Bootstrap 标注
note:
  # Note 提示框样式配置（标签插件）
  # 注意标签样式值：
  # - 简单的 bs-callout 旧警报样式。默认。
  # - 现代 bs-callout 新 (v2-v3) 警报样式。
  # - 带背景的扁平标注样式，如 Mozilla 或 StackOverflow。
  # - 禁用禁用注释标签的所有 CSS 样式导入。
  style: flat
  icons: true
  border_radius: 3
  # 现代风格和扁平化风格的背景淡化百分比偏移量（现代：-12 | 12；扁平：-18 | 6）。
  # 偏移量也适用于标签标签变量。此选项可以与禁用的注释标签一起使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# 参考链接：https://github.com/MoOx/pjax
# 新手建议：开启 PJAX 可实现页面无刷新跳转
# 核心配置：pjax
# 新手建议：开启 PJAX 可实现页面无刷新跳转
pjax:
  # PJAX 无刷新跳转配置
  enable: true
  # 从pjax中排除指定页面，例如'/music/'
  exclude:
    # - 示例路径：/xxxxxx/

# 注入CSS和脚本（aplayer/meting）
aplayerInject:
  # APlayer/Meting 资源注入配置
  enable: true
  per_page: true

# Snackbar - Toast 通知
# 参考链接：https://github.com/polonel/SnackBar
# 位置：左上/中上/右上/左下/中下/右下
snackbar:
  # Snackbar 弹窗提示配置
  enable: true
  position: bottom-left
  # 浅色模式和深色模式下 Toast 通知的背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# 即时页面
# 参考链接：https://instant.page/
instantpage: true
# instant.page 预加载优化开关

# 延迟加载
# 参考链接：https://github.com/verlok/vanilla-lazyload
# 新手建议：图片懒加载，优化加载速度
# 核心配置：lazyload
# 新手建议：图片懒加载，优化加载速度
lazyload:
  enable: true
  # 使用浏览器的本机延迟加载而不是普通延迟加载
  native: false
  # 指定要使用延迟加载的字段（站点或帖子）
  field: site
  placeholder:
  blur: false

# 渐进式网页应用
# 参考：https://github.com/JLHwung/hexo-offline
# ---------------
# 新手建议：PWA 离线访问功能
# 核心配置：pwa
# 新手建议：PWA 离线访问功能
pwa:
  # PWA 配置（manifest、图标）
  enable: false
  manifest: /manifest.json
  apple_touch_icon: /img/favicon.png
  favicon_32_32: /img/favicon.png
  favicon_16_16: /img/favicon.png
  mask_icon: /img/favicon.png

# 打开图元标签
# 参考链接：https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  # Open Graph 社交分享元数据配置
  enable: true
  option:
    # 推特卡：
    # 推特图片：
    # 推特 ID：
    # 推特网站：
    # 谷歌_加：
    # fb_管理员：
    # 说明：fb_app_id：

# 结构化数据
# 参考链接：https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: true
  # 站点的备用名称，用于结构化数据
  # 格式：['姓名1','姓名2']
  alternate_name: ['Zyang Blog', 'Tech Blog']

# 添加供应商前缀以确保兼容性
css_prefix: true

# 注入
# 将代码插入到头部（“</head>”标签之前）和底部（“</body>”标签之前）
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/universe-particles.js" defer></script>
    - <script src="/js/hero-lottie.js" defer></script>
    - <script src="/js/aside-ip-info.js" defer></script>
    - <script src="/js/random-post.js" defer></script>

