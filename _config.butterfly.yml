# --------------------------------------
# Hexo Butterfly 主题配置
# 如果有任何疑问，请参阅文档
# 中文文档：https://butterfly.js.org/
# 英文文档：https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航设置
# --------------------------------------

# 新手建议：导航栏外观设置
# 核心配置：nav
# 新手建议：导航栏外观设置
nav:
  # 导航栏标志图片
  logo: /img/touxiang.jpg
  display_title: true
  display_post_title: true
  # 是否修复导航栏
  fixed: false

# 新手建议：在此配置导航栏菜单及其子菜单，格式为 '显示名称: /路径/ || 图标'
# 核心配置：menu
# 新手建议：在此配置导航栏菜单及其子菜单，格式为 '显示名称: /路径/ || 图标'
menu:
   首页: / || fas fa-home
   文章||fas fa-pen-nib||hide:
    分类: /categories/ || fas fa-folder-open
   资源||fas fa-box-open||hide:
    工具: /tools/ || fas fa-wrench
    分享: /sites/ || fas fa-gem
   关于: /about/ || fas fa-user

code_blocks:
  # 代码块主题：深色/苍白之夜/浅色/海洋/假
  theme: light
  macStyle: true
  # 代码块高度限制（单位：px）
  height_limit: 320
  word_wrap: true

  # 工具栏
  copy: true
  language: true
  # true：缩小代码块 | false：展开代码块 | none：展开代码块并隐藏按钮
  shrink: false
  fullpage: true

# 社交媒体链接
# 正式的：
# 图标：链接||描述 ||颜色
# 新手建议：社交平台链接，格式为 '平台名: 链接 || 图标'
# 核心配置：social
# 新手建议：社交平台链接，格式为 '平台名: 链接 || 图标'
social:
  fab fa-github: https://github.com/szy321123 || Github || '#24292e'
  fas fa-envelope: mailto:szy007700@qq.com || Email || '#4a7dbe'
  fab fa-telegram-plane: https://t.me/boluo12334 || Telegram || '#229ED9'

# --------------------------------------
# 图像设置
# --------------------------------------

# 新手建议：网站图标，建议放在 source/img/ 目录下
# 核心配置：favicon
# 新手建议：网站图标，建议放在 source/img/ 目录下
favicon: /img/touxiang.jpg

# 新手建议：头像设置，img 项填写图片 URL
# 核心配置：avatar
# 新手建议：头像设置，img 项填写图片 URL
avatar:
  img: /img/touxiang.jpg
  effect: false

# 禁用所有横幅图像
disable_top_img: false

# 如果页面的banner没有设置，则会显示default_top_img
default_top_img: false

# 索引页的横幅图像
index_img: /img/hero-placeholder.svg

# 存档页面的横幅图像
archive_img: false

# 注意：标签页，不是标签页
tag_img: false

# 标签页的banner图片，可以为每个标签设置banner图片
# 格式：
# - 标签名称：xxxxx
tag_per_img:

# 注意：类别页面，不是类别页面
category_img: false

# 分类页面的banner图片，可以为每个分类设置banner图片
# 格式：
# - 类别名称：xxxxx
category_per_img:

# 页脚的背景图片
footer_img: false

# 网站背景
# 可以将其设置为颜色、图像 URL 或包含颜色和/或图像 URL 的数组
# 如果提供了数组，则每次加载时都会从数组中选择随机背景
background: false
cover:
  # 是否禁用盖子
  index_enable: true
  aside_enable: true
  archives_enable: false
  # 未设置封面时，显示默认封面
  default_cover:
    # - 示例图片：xxx.jpg

# 替换损坏的图像
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 一个简单的404页面
error_404:
  # 404 页面配置
  enable: true
# 新手建议：副标题打字机效果，可以在此处配置显示的文字
# 核心配置：subtitle
# 新手建议：副标题打字机效果，可以在此处配置显示的文字
  subtitle: 'Page Not Found'
  background: /img/404.png

post_meta:
  # 主页
  page:
    # 选择：创建/更新/两者
    date_type: created
    # 选择：日期/亲属
    date_format: date
    categories: true
    tags: true
    label: true
# 新手建议：文章页相关配置
# 新手建议：文章页相关配置
  post:
    # 选择：左/中
    position: left
    # 选择：创建/更新/两者
    date_type: both
    # 选择：日期/亲属
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 索引页设置
# --------------------------------------

# 首页top_img设置
# 默认：顶部图像 - 全屏，站点信息 - 中间
# 站点信息的位置，例如：300px/300em/300rem/10%
index_site_info_top:
# top_img的高度，eg: 300px/300em/300rem
index_top_img_height:

# 主页上的副标题
# 新手建议：副标题打字机效果，可以在此处配置显示的文字
# 核心配置：subtitle
# 新手建议：副标题打字机效果，可以在此处配置显示的文字
subtitle:
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # 参考链接：https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 源码-调用第三方服务API
  # 它会先显示源，然后显示子内容
  # 选择：假/1/2/3
  # false - 禁用该功能
  # 来源1：hitokoto.cn
  # 来源2：https://api.aa1.cn/doc/yiyan.html
  # 来源3：jinrishici.com
  source: 1
  # 如果关闭打字机效果，字幕将只显示sub的第一行
  sub:
    - 在代码与日常之间，慢慢发光。
    - 记录每次折腾，也收藏每份热爱。
    - 欢迎来到汤圆的数字小屋。

# 主页上的文章布局
# 1：左侧封面，右侧信息
# 2：封面在右边，信息在左边
# 3：封面和信息左右交替
# 4：封面在顶部，信息在底部
# 5：封面上显示的信息
# 6：砖石布局 - 顶部为封面，底部为信息
# 7：砖石布局 - 封面上显示的信息
# 新手建议：首页布局设置，控制边栏位置及显示
# 核心配置：index_layout
# 新手建议：首页布局设置，控制边栏位置及显示
index_layout: 3

# 首页显示文章简介
# 1：说明
# 2：两者（如果描述存在，则显示描述，或显示auto_excerpt）
# 3：自动摘录（默认）
# false：不显示文章简介
index_post_content:
  method: 3
  # 如果设置方法为2或3，则需要配置长度
  length: 500

# --------------------------------------
# 帖子设置
# --------------------------------------

# 新手建议：文章目录设置，enable 为 true 开启
# 核心配置：toc
# 新手建议：文章目录设置，enable 为 true 开启
toc:
# 新手建议：文章页相关配置
# 新手建议：文章页相关配置
  post: true
  page: true
  number: true
  expand: true
  # 仅供发帖
  style_simple: true
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞助/奖励
# 新手建议：打赏功能，配置微信/支付宝收款码
# 核心配置：reward
# 新手建议：打赏功能，配置微信/支付宝收款码
reward:
  enable: true
  text: Thanks for your support
  QR_code:
    - img: /img/favicon.png
      link:
      text: wechat
    - img: /img/favicon.png
      link:
      text: alipay

# 帖子编辑
# 轻松在线浏览和编辑博客源代码。
post_edit:
  enable: false
  # 编辑地址：https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如：https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url: https://github.com/your-name/your-repo/edit/main/source/

# 相关文章
related_post:
  enable: true
  # 显示的帖子数量
  limit: 6
  # 选择：创建/更新
  date_type: created

# 选择：1 / 2 / 假
# 1：“下一篇文章”将链接到旧帖子
# 2：“下一篇文章”将链接到新帖子
# false：禁用分页
post_pagination: 1

# 显示帖子的过时通知
noticeOutdate:
  enable: true
  # 风格：简约/扁平
  style: flat
  # 什么时候会显示
  limit_day: 365
  # 位置：顶部/底部
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
# 新手建议：导航栏外观设置
# 核心配置：nav
# 新手建议：导航栏外观设置
  nav:
  owner:
    enable: true
    since: 2025
  # 主题和框架版权
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# 旁白设置
# --------------------------------------

# 新手建议：侧边栏卡片设置，控制显示哪些模块
# 核心配置：aside
# 新手建议：侧边栏卡片设置，控制显示哪些模块
aside:
  enable: true
  hide: false
  # 显示隐藏右下按钮旁边的按钮
  button: true
  mobile: true
  # 位置：左/右
  position: left
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/szy321123
  card_announcement:
    enable: true
    content: |
      你好，欢迎来到我的博客。<br>
      这里记录了我的技术成长和日常折腾。<br>
      希望你能在这里找到有用的东西。
      <div class="site-note">
        <div class="site-note-title">站点小记</div>
        <div class="site-note-item">⚙️ 博客框架:Hexo</div>
        <div class="site-note-item">🦋 页面主题:Butterfly</div>
        <div class="site-note-item">☁️ 部署服务:DigitalOcean</div>
        <div class="site-note-item">🛡️ 网络加速:Cloudflare</div>
        <div class="site-note-item">📝 更新内容:技术记录与日常折腾</div>
      </div>
  card_welcome:
    enable: true
    title: 欢迎
    owner_name: 博主
    owner_lng: 121.476
    owner_lat: 31.224
    api_key: a4854b6f98565c33
    loading: 正在获取你的访问信息...
    fallback: 欢迎光临，很高兴你来到这里。
    error: 欢迎光临，很高兴你来到这里。
  card_recent_post:
    enable: true
    # 如果设置0将显示全部
    limit: 5
    # 排序：日期/更新
    sort: date
    sort_order:
  card_newest_comments:
    enable: true
    sort_order:
    limit: 6
    # 单位：分钟，保存数据到localStorage
    storage: 10
# 新手建议：头像设置，img 项填写图片 URL
# 核心配置：avatar
# 新手建议：头像设置，img 项填写图片 URL
    avatar: true
  card_categories:
    enable: false
    # 如果设置0将显示全部
    limit: 8
    # 选择：无/真/假
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 如果设置0将显示全部
    limit: 40
    color: false
    custom_colors:
    # 标签顺序，随机/名称/长度
    orderby: random
    # 排序。 1、asc为上升； -1, desc 为降序
    order: 1
    sort_order:
  card_archives:
    enable: false
    # 类型： 每月/每年
    type: monthly
    # Eg: YYYY年MM月
    format: MMMM YYYY
    # 排序。 1、asc为上升； -1, desc 为降序
    order: -1
    # 如果设置0将显示全部
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序。 1、asc为上升； -1, desc 为降序
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    # 发布日期与现在的时间差
    # 正式：月/日/年时间或年/月/日时间
    # 如果您不启用此功能，请将其留空
    runtime_date:

# --------------------------------------
# 右下按钮
# --------------------------------------

# 右下按钮到底部的距离（默认单位：px）
rightside_bottom:

# 繁简体中文转换
translate:
  enable: true
  # 按钮的文本
  default: 繁
  # 网站语言（1 - 繁体中文/ 2 - 简体中文）
  defaultEncoding: 2
  # 延时
  translateDelay: 0
  # 语言为简体中文时按钮的文字
  msgToTraditionalChinese: '繁'
  # 语言为繁体中文时按钮的文字
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

# 深色模式
# 新手建议：深色模式开关
# 核心配置：darkmode
# 新手建议：深色模式开关
darkmode:
  enable: true
  # 切换按钮可切换暗/亮模式
  button: true
  # 自动切换暗/亮模式
  # autoChangeMode: 1 遵循系统设置，如果系统不支持深色模式，则会在下午 6 点到早上 6 点之间切换深色模式
  # autoChangeMode: 2 在下午 6 点到早上 6 点之间切换深色模式
  # 自动更改模式：假
  autoChangeMode: false
  # 设置灯光模式时间。值在0到24之间。如果不设置，默认值为6和18
  start:
  end:

# 在滚动到顶部按钮中显示滚动百分比
rightside_scroll_percent: true

# 除非您知道以下设置如何工作，否则请勿修改它们
# 选择：阅读模式、翻译、深色模式、隐藏、目录、聊天、评论
# 不要重复相同的值
rightside_item_order:
  enable: false
  # 默认：读取模式、翻译、深色模式、隐藏模式
  hide:
  # 默认：目录、聊天、评论
  show:

# 右下角配置按钮的动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 当您滚动时，URL 将根据 header id 进行更新。
  auto_update: true
  # 点击标题滚动并更新锚点
  click_to_scroll: true

photofigcaption: true

copy:
  enable: true
  # 复制内容后添加版权信息
  copyright:
    enable: true
    limit_count: 150

# 需要安装hexo-wordcount插件
wordcount:
  enable: true
  # 在帖子元中显示文章的字数
  post_wordcount: true
  # 在帖子元中显示阅读文章的时间
  min2read: true
  # 在aside的webinfo中显示网站的总字数
  total_wordcount: true

# 布蒜子现场PV/UV计数
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学
# --------------------------------------

# 关于 per_page
# 如果将其设置为 true，它将在每个页面中加载 mathjax/katex 脚本
# 如果将其设置为 false，它将根据您的设置加载 mathjax/katex 脚本（在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true'）
# 新手建议：数学公式渲染，支持 KaTeX 和 MathJax
# 新手建议：数学公式渲染，支持 KaTeX 和 MathJax
math:
  # 选择：mathjax、katex
  # 如果不需要数学，请将其留空
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # MathJax 专属配置
    # 启用上下文菜单
    enableMenu: true
    # 选择：all / ams / none，这控制方程是否编号以及如何编号
    tags: none

  katex:
    # KaTeX 专属配置
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

# 新手建议：搜索系统配置，推荐使用 local_search
# 核心配置：search
# 新手建议：搜索系统配置，推荐使用 local_search
search:
  # 选择：algolia_search / local_search / docsearch
  # 如果不需要搜索，则将其留空
  use: local_search
  placeholder: 搜索文章

  # 阿尔戈利亚搜索
  algolia_search:
    # Algolia 搜索参数
    # 每页搜索结果数
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据。
    preload: false
    # 显示每篇文章的前 n 个结果，设置为 -1 则显示所有结果
    top_n_per_article: 1
    # 将 html 字符串转义为可读字符串。
    unescape: false
    # 启用搜索结果分页
    pagination:
      enable: false
      # 每页搜索结果数
      hitsPerPage: 8
# 新手建议：CDN 静态资源加速
# 核心配置：CDN
# 新手建议：CDN 静态资源加速
    CDN:

  # 文档搜索
  # 参考链接：https://docsearch.algolia.com/
  docsearch:
    # Algolia DocSearch 参数
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 共享系统
# --------------------------------------

share:
  # 选择：sharejs / addtoany
  # 如果不需要共享，请将其留空
  use: sharejs

  # 分享.js
  # 参考链接：https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # 添加到任意
  # 参考链接：https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

# 新手建议：评论系统，支持 Disqus, Valine, Waline 等
# 核心配置：comments
# 新手建议：评论系统，支持 Disqus, Valine, Waline 等
comments:
  # 最多两条评论系统，默认显示第一条
  # 如果不需要评论则留空
  # 选择：Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Arttalk
  # 两种评论系统的格式：Disqus、Waline
  use:
  # 在按钮旁边显示评论名称
  text: true
  # Lazyload：当评论元素进入浏览器视口时，评论系统将被加载。
  # 如果设置为true，则评论计数无效
# 新手建议：图片懒加载，优化加载速度
# 核心配置：lazyload
# 新手建议：图片懒加载，优化加载速度
  lazyload: false
  # 在帖子的 top_img 中显示评论数
  count: false
  # 在主页显示评论数
  card_post_count: false

# 讨论
# 参考链接：https://disqus.com/
disqus:
# Disqus 评论系统配置
  shortname:
  # 获取最新评论小部件
  apikey:

# Alternative Disqus - 使用 Disqus API 呈现评论
# 参考链接：https://github.com/SukkaW/DisqusJS
disqusjs:
# DisqusJS 评论系统配置
  shortname:
  apikey:
  option:

# 利弗尔
# 参考链接：https://www.livere.com/
livere:
# Livere 评论系统配置
